name: Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags (e.g., v2.2.0)
  workflow_dispatch:  # Manual trigger for controlled releases
    inputs:
      tag_name:
        description: 'Git tag for release (e.g., v2.2.0, v2.3.0)'
        required: true
        type: string
      publish_to_pypi:
        description: 'Publish to PyPI (production)'
        required: true
        type: boolean
        default: false
      create_github_release:
        description: 'Create GitHub Release'
        required: true
        type: boolean
        default: true

env:
  PYTHON_VERSION: '3.12'
  POETRY_VERSION: '2.1.4'

jobs:
  # Build Python Package
  build:
    name: Build Python Package
    runs-on: ubuntu-latest

    steps:
      - name: Set tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for changelog

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --no-root

      - name: Install project
        run: poetry install --no-interaction

      - name: Build package
        run: |
          poetry build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/
          retention-days: 7

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Only publish to PyPI when manually triggered with publish_to_pypi=true
    if: github.event_name == 'workflow_dispatch' && inputs.publish_to_pypi == true

    steps:
      - name: Set tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package
          path: dist/

      - name: Publish to PyPI
        env:
          POETRY_PYPI_TOKEN_PYPI: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          poetry publish --no-interaction

      - name: Verify PyPI publication
        run: |
          VERSION="${{ steps.tag.outputs.name }}"
          VERSION="${VERSION#v}"
          sleep 30
          pip install chalkbox==$VERSION
          python -c "import chalkbox; print(f'ChalkBox version: {chalkbox.__version__}')"

  create-github-release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    # Create release when: 1) triggered by tag push, OR 2) manually triggered with create_github_release=true
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.create_github_release == true)
    permissions:
      contents: write

    steps:
      - name: Set tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package
          path: dist/

      - name: Generate SHA256 checksums
        run: |
          cd dist/
          sha256sum *.whl *.tar.gz > checksums.txt
          cat checksums.txt
          cd ..

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${{ steps.tag.outputs.name }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: changelog
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.tag.outputs.name }}
          REPO: ${{ github.repository }}
        run: |
          # Flag-based extraction: print lines between "## [VERSION]" and the
          # next "## [" header, excluding both. A range expression (/a/,/b/)
          # breaks here because the header line matches both patterns and
          # collapses the range to one line.
          CHANGELOG_SECTION=$(awk -v hdr="## [${VERSION}]" 'index($0, hdr) == 1 {found=1; next} /^## \[/{found=0} found' CHANGELOG.md || echo "")
          echo "DEBUG: extracted changelog length: ${#CHANGELOG_SECTION}"

          HAS_BREAKING_CHANGES=false
          if [ -n "$CHANGELOG_SECTION" ] && echo "$CHANGELOG_SECTION" | grep -qi "breaking change"; then
            HAS_BREAKING_CHANGES=true
          fi

          BREAKING_CHANGES=$(echo "$CHANGELOG_SECTION" | awk '/### Breaking Changes/,/^### [^B]/' | grep -v "^###" || echo "")
          CHECKSUMS=$(cat dist/checksums.txt || echo "")

          if [ -n "$CHANGELOG_SECTION" ] && [ "${#CHANGELOG_SECTION}" -gt 10 ]; then
            {
              echo "## Installation"
              echo ""
              echo "### PyPI (Recommended)"
              echo ""
              echo '```bash'
              echo "pip install chalkbox==${VERSION}"
              echo '```'
              echo ""
              echo "### From Source"
              echo ""
              echo '```bash'
              echo "pip install https://github.com/${REPO}/releases/download/${TAG}/chalkbox-${VERSION}-py3-none-any.whl"
              echo '```'
              echo ""
              echo "## Distribution Links"
              echo ""
              echo "| Platform | Link |"
              echo "|----------|------|"
              echo "| **PyPI** | [chalkbox v${VERSION}](https://pypi.org/project/chalkbox/${VERSION}/) |"
              echo "| **Documentation** | [README](https://github.com/${REPO}#readme) |"
              echo "| **Changelog** | [CHANGELOG.md](https://github.com/${REPO}/blob/master/CHANGELOG.md) |"
              echo ""
              echo "## What's Changed"
              echo ""
              printf '%s\n' "$CHANGELOG_SECTION"
            } > release_notes.md

            if [ "$HAS_BREAKING_CHANGES" = "true" ]; then
              {
                echo ""
                echo "## Upgrade Notes"
                echo ""
                echo "This release contains breaking changes. Please review before upgrading:"
                echo ""
                printf '%s\n' "$BREAKING_CHANGES"
              } >> release_notes.md
            fi

            {
              echo ""
              echo "## Package Checksums (SHA256)"
              echo ""
              echo "| File | SHA256 |"
              echo "|------|--------|"
            } >> release_notes.md

            echo "$CHECKSUMS" | while read -r hash filename; do
              [ -n "$hash" ] && echo "| \`${filename}\` | \`${hash}\` |" >> release_notes.md
            done

            {
              echo ""
              echo "## Assets"
              echo ""
              echo "This release includes:"
              echo "- **Python Wheel** (\`.whl\`) - Universal wheel for all platforms"
              echo "- **Source Distribution** (\`.tar.gz\`) - Complete source code with all files"
              echo ""
              echo "---"
              echo ""
              echo "**Full Changelog**: https://github.com/${REPO}/blob/master/CHANGELOG.md"
              echo ""
              echo "**First time using ChalkBox?** Check out the [Quick Start Guide](https://github.com/${REPO}#quick-start)"
            } >> release_notes.md
          else
            {
              echo "## Release ${VERSION}"
              echo ""
              echo "See the full changelog: https://github.com/${REPO}/blob/master/CHANGELOG.md"
            } > release_notes.md
          fi

          echo "DEBUG: final release notes:"
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Release v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.name, 'alpha') || contains(steps.tag.outputs.name, 'beta') || contains(steps.tag.outputs.name, 'rc') }}
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post Release Summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag**: ${{ steps.tag.outputs.name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Published Packages" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **PyPI**: https://pypi.org/project/chalkbox/${{ steps.version.outputs.version }}/" >> $GITHUB_STEP_SUMMARY
          echo "- **GitHub Release**: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ steps.tag.outputs.name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Python Package" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "pip install chalkbox==${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
